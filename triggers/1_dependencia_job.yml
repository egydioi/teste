name: GitHub Actions - Teste com dependência Template
run-name: Running - Teste com dependência Template
on: [push, workflow_dispatch]


jobs:
                teste_unit:
                    runs-on: ubuntu-latest
                    steps:
                        -   name: Comentário
                            run: echo "Teste sem dependência Template - Unitário"
                test_api:
                    needs: teste_unit
                    runs-on: ubuntu-latest
                    steps:
                        -   name: Comentário
                            run: echo "Teste sem dependência Template - API"
                test_ui:
                    needs: [teste_unit, test_api]
                    runs-on: ubuntu-latest
                    steps:
                        -   name: Comentário
                            run: echo "Teste sem dependência Template - UI"